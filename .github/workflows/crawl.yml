name: Crawl and Aggregate

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'community-catalogs/**/rp-catalog.json'
      - 'src/**'
      - '.github/workflows/crawl.yml'

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Only run on the main repository
    if: github.repository == 'FIDEScommunity/fides-rp-catalog'
    
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so crawler can use git log for accurate updatedAt per catalog file (like wallet catalog)
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run crawler
        run: npm run crawl
      
      - name: Commit and push if changed
        id: autocommit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update aggregated RP data"
          file_pattern: 'data/aggregated.json'

      # Tells the production WordPress site to flush its aggregated.json cache
      # (Fides_Catalog_Source transient + options-backup) so freshly crawled
      # relying parties show up in seconds instead of after the 6h TTL.
      # Set both `vars.WP_INVALIDATE_URL` and `secrets.WP_INVALIDATE_SECRET`
      # in the repo settings to enable. Forks / unconfigured repos skip
      # silently. A failed call does not break the workflow — production
      # falls back to its 6h TTL.
      - name: Notify production WordPress to flush catalog cache
        if: steps.autocommit.outputs.changes_detected == 'true'
        env:
          WP_INVALIDATE_URL: ${{ vars.WP_INVALIDATE_URL }}
          WP_INVALIDATE_SECRET: ${{ secrets.WP_INVALIDATE_SECRET }}
          CATALOG_TYPE: rp
        run: |
          if [ -z "${WP_INVALIDATE_URL}" ] || [ -z "${WP_INVALIDATE_SECRET}" ]; then
            echo "Skipping: WP_INVALIDATE_URL/SECRET not configured for this repo."
            exit 0
          fi
          echo "Notifying ${WP_INVALIDATE_URL} (type=${CATALOG_TYPE})..."
          curl -fsS -X POST "${WP_INVALIDATE_URL}" \
            -H "X-FIDES-Catalog-Secret: ${WP_INVALIDATE_SECRET}" \
            --data-urlencode "type=${CATALOG_TYPE}" \
            -w '\nHTTP %{http_code}\n' \
            || echo "WP invalidate failed (non-fatal; production has 6h TTL fallback)"

